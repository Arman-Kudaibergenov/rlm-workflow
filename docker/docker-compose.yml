services:
  rlm:
    image: ghcr.io/arman-kudaibergenov/rlm-workflow:latest
    # Or build locally:
    # build: .
    container_name: rlm
    restart: unless-stopped
    ports:
      - "${RLM_PORT:-8200}:8200"
    volumes:
      # Required persistence volume for RLM facts, indexes, and session state
      - rlm-data:/data
      # Optional project bind mount example:
      # - ${PROJECT_PATH:-./project}:/workspace:ro
    environment:
      - RLM_DATA_DIR=/data
      # Optional: point project discovery at a mounted workspace path
      # - RLM_PROJECT_ROOT=/workspace
      - RLM_HOST=0.0.0.0
      - RLM_PORT=8200
      - RLM_TRANSPORT=${RLM_TRANSPORT:-sse}
      # Embedding: default = paraphrase-multilingual-MiniLM-L12-v2 (multilingual, CPU)
      # For Ollama GPU: RLM_EMBEDDING_PROVIDER=ollama, OLLAMA_BASE_URL, RLM_EMBEDDING_MODEL
      # For OpenAI/LM Studio: RLM_EMBEDDING_PROVIDER=openai, OPENAI_API_KEY or OPENAI_API_BASE
      - RLM_EMBEDDING_MODEL=${RLM_EMBEDDING_MODEL:-}
      - RLM_EMBEDDING_PROVIDER=${RLM_EMBEDDING_PROVIDER:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-}
      # Strict mode: exit on embedding failure instead of falling back
      - RLM_EMBEDDING_STRICT=${RLM_EMBEDDING_STRICT:-}
      # Tools: default = 12 essential tools. Set RLM_TOOLS=all for everything
      - RLM_TOOLS=${RLM_TOOLS:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  rlm-data:
    # Note: if migrating from `docker run` to compose, you may need:
    #   external: true
    # to reuse the existing `rlm-data` volume created by `docker run`.
    # Without this, compose creates a project-prefixed volume (e.g., `rlm_rlm-data`).
    driver: local
