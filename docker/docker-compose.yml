services:
  rlm:
    image: ghcr.io/arman-kudaibergenov/rlm-workflow:latest
    # Or build locally:
    # build: .
    container_name: rlm
    restart: unless-stopped
    ports:
      - "${RLM_PORT:-8200}:8200"
    volumes:
      # Required persistence volume for RLM facts, indexes, and session state
      - rlm-data:/data
      # Optional project bind mount example:
      # - ${PROJECT_PATH:-./project}:/workspace:ro
    environment:
      - RLM_DATA_DIR=/data
      # Optional: point project discovery at a mounted workspace path
      # - RLM_PROJECT_ROOT=/workspace
      - RLM_HOST=0.0.0.0
      - RLM_PORT=8200
      - RLM_TRANSPORT=${RLM_TRANSPORT:-sse}
      # Embedding model — default: all-MiniLM-L6-v2 (English-optimized)
      # For multilingual (Russian, etc.): paraphrase-multilingual-MiniLM-L12-v2
      - RLM_EMBEDDING_MODEL=${RLM_EMBEDDING_MODEL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  rlm-data:
    # Note: if migrating from `docker run` to compose, you may need:
    #   external: true
    # to reuse the existing `rlm-data` volume created by `docker run`.
    # Without this, compose creates a project-prefixed volume (e.g., `rlm_rlm-data`).
    driver: local
