services:
  rlm:
    image: ghcr.io/arman-kudaibergenov/rlm-workflow:latest
    # Or build locally:
    # build: .
    container_name: rlm
    restart: unless-stopped
    ports:
      - "${RLM_PORT:-8200}:8200"
    volumes:
      - rlm-data:/data
    environment:
      - RLM_DATA_DIR=/data
      - RLM_HOST=0.0.0.0
      - RLM_PORT=8200
      - RLM_TRANSPORT=${RLM_TRANSPORT:-sse}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  rlm-data:
    driver: local
